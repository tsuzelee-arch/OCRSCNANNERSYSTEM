name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger release on push tag (v1.0.0)
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "Order_OCR_Windows" --add-data "database;database" --add-data "processing;processing" --add-data "ui;ui" --add-data "core;core" --add-data "services;services" main.py

    - name: Prepare Release Artifacts
      run: |
        cd dist
        Compress-Archive -Path Order_OCR_Windows -DestinationPath Order_OCR_Windows.zip

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: dist/Order_OCR_Windows.zip

  build_mac:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller (Mac Native .app)
      run: |
        pyinstaller --noconfirm --onedir --windowed \
          --add-data "ui:ui" \
          --add-data "database:database" \
          --add-data "processing:processing" \
          --add-data "core:core" \
          --add-data "services:services" \
          main.py --name "Order_OCR_Mac"

    - name: Compress Mac Application
      run: |
        cd dist
        zip -r Order_OCR_Mac.zip Order_OCR_Mac.app/

    - name: Upload Mac Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-build
        path: dist/Order_OCR_Mac.zip

  release:
    needs: [build_windows, build_mac]
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows Build
      uses: actions/download-artifact@v4
      with:
        name: windows-build

    - name: Download Mac Build
      uses: actions/download-artifact@v4
      with:
        name: mac-build

    - name: Set Tag Name
      id: set_tag
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "TAG_NAME=${{ github.event.inputs.version }}" >> $GITHUB_ENV
        else
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: Release ${{ env.TAG_NAME }}
        files: |
          Order_OCR_Windows.zip
          Order_OCR_Mac.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
